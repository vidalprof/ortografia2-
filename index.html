<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caça-Letras: A Aventura das Palavras</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Comic Sans MS", "Trebuchet MS", Verdana, sans-serif;
    background: #2d8bba;
    background: -webkit-gradient(linear, left top, left bottom, from(#34c4d8), to(#2d6fba));
    background: linear-gradient(#34c4d8, #2d6fba);
    color: #222; min-height: 100vh; padding: 12px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }
  .topbar {
    background: #fff; border: 5px solid #ffd23f; border-radius: 18px;
    padding: 10px 16px; margin-bottom: 14px; overflow: hidden; box-shadow: 0 4px 0 #00000022;
  }
  .topbar .logo { float: left; font-size: 22px; color: #ee5a24; font-weight: bold; }
  .topbar .stats { float: right; text-align: right; font-size: 16px; }
  .topbar .stats b { color: #2d6fba; }
  .star { color: #ffb700; }
  .card { background: #fff; border-radius: 22px; padding: 22px; box-shadow: 0 8px 0 #00000022; text-align: center; min-height: 380px; }
  h1 { font-size: 30px; color: #ee5a24; margin-bottom: 8px; }
  h2 { font-size: 22px; color: #2d6fba; margin-bottom: 14px; }
  p.lead { font-size: 17px; line-height: 1.5; margin-bottom: 18px; color: #444; }
  .levels { overflow: hidden; }
  .level-btn {
    display: block; width: 100%; margin: 10px 0; padding: 16px; font-size: 18px;
    font-family: inherit; font-weight: bold; color: #fff; border: none; border-radius: 14px;
    cursor: pointer; box-shadow: 0 5px 0 #00000033; -webkit-transition: all .1s; transition: all .1s;
    position: relative; text-align: left;
  }
  .level-btn:active { -webkit-transform: translateY(3px); transform: translateY(3px); box-shadow: 0 2px 0 #00000033; }
  .lv1 { background: #ee5a24; } .lv2 { background: #16a085; } .lv3 { background: #8e44ad; }
  .lv4 { background: #2d6fba; } .lv5 { background: #00b894; } .lv6 { background: #6c5ce7; } .lv7 { background: #d63031; }
  .lvb1 { background: #e84393; } .lvb2 { background: #f0932b; }
  .level-btn small { display: block; font-size: 13px; font-weight: normal; margin-top: 4px; }
  .level-btn.locked { background: #b2bec3; box-shadow: 0 5px 0 #8a9396; cursor: not-allowed; color: #f0f0f0; }
  .level-btn .tag { position: absolute; top: 10px; right: 14px; font-size: 22px; }
  .badge-bonus, .badge-tipo { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-left: 6px; vertical-align: middle; }
  .badge-bonus { background: #ffd23f; color: #8a6d00; }
  .badge-tipo { background: #ffffff44; color: #fff; }
  .hint { background: #fff7e0; border: 3px dashed #ffd23f; border-radius: 14px; padding: 10px; font-size: 16px; margin-bottom: 16px; color: #8a6d00; }
  .figura { margin: 6px 0 4px; min-height: 110px; }
  .figura .emojibig { font-size: 70px; line-height: 110px; }
  .figura .figimg, .mem-front .figimg, .ds-slot .figimg { width: 96px; height: 96px; object-fit: contain; vertical-align: middle; }
  .mem-front .figimg { width: 70px; height: 70px; }
  .ds-slot .figimg { width: 60px; height: 60px; }
  .word-box { font-size: 38px; font-weight: bold; color: #222; margin: 12px 0; letter-spacing: 2px; }
  .gap { color: #ee5a24; background: #ffe3d6; border-radius: 8px; padding: 0 8px; border-bottom: 4px solid #ee5a24; }
  .options { overflow: hidden; }
  .opt { display: inline-block; margin: 8px; padding: 16px 26px; font-size: 26px; font-family: inherit; font-weight: bold;
    color: #fff; background: #2d6fba; border: none; border-radius: 14px; cursor: pointer; box-shadow: 0 5px 0 #1b4d85; min-width: 90px; }
  .opt:active { -webkit-transform: translateY(3px); transform: translateY(3px); box-shadow: 0 2px 0 #1b4d85; }
  .opt.correct { background: #27ae60; box-shadow: 0 5px 0 #1e7e46; }
  .opt.wrong { background: #c0392b; box-shadow: 0 5px 0 #8e2820; }
  .feedback { font-size: 21px; font-weight: bold; min-height: 30px; margin: 14px 0; }
  .feedback.ok { color: #27ae60; } .feedback.no { color: #c0392b; }
  .nav-btn { padding: 14px 28px; font-size: 18px; font-family: inherit; font-weight: bold; color: #fff;
    background: #ee5a24; border: none; border-radius: 14px; cursor: pointer; box-shadow: 0 5px 0 #b8420f; margin: 6px; }
  .nav-btn:active { -webkit-transform: translateY(3px); transform: translateY(3px); box-shadow: 0 2px 0 #b8420f; }
  .nav-btn.ghost { background: #95a5a6; box-shadow: 0 5px 0 #6c7a7b; }
  .progress { font-size: 15px; color: #888; margin-bottom: 10px; }
  .bar { background: #e0e6ea; border-radius: 10px; height: 16px; overflow: hidden; margin-bottom: 16px; }
  .bar i { display: block; height: 100%; background: #27ae60; width: 0%; -webkit-transition: width .3s; transition: width .3s; }
  .trophy { font-size: 80px; }
  .big-score { font-size: 30px; color: #2d6fba; font-weight: bold; margin: 10px 0; }
  .unlock-msg { background: #eafaf1; border: 3px solid #27ae60; border-radius: 14px; padding: 12px; color: #1e7e46; font-size: 17px; font-weight: bold; margin: 14px 0; }
  .footer-note { text-align: center; color: #ffffffcc; font-size: 13px; margin-top: 16px; }
  .map-line { font-size: 13px; color: #888; margin-bottom: 18px; line-height: 1.6; }

  /* MEMÓRIA */
  .mem-grid { display: inline-block; }
  .mem-row { white-space: nowrap; }
  .mem-card { display: inline-block; width: 78px; height: 78px; margin: 6px; vertical-align: top; cursor: pointer; }
  .mem-face { width: 100%; height: 100%; border-radius: 12px; text-align: center; font-weight: bold; box-shadow: 0 4px 0 #00000033; }
  .mem-back { background: #6c5ce7; color: #fff; font-size: 30px; line-height: 78px; }
  .mem-back:after { content: "?"; }
  .mem-front { background: #fef6e4; }
  .mem-front .palavra { font-size: 15px; line-height: 78px; color: #2d3436; }
  .mem-front svg { width: 72px; height: 72px; margin-top: 3px; }
  .mem-done .mem-front { background: #d6ffe8; }

  /* CAÇA-PALAVRAS */
  .cp-grid { display: inline-block; border: 3px solid #2d6fba; border-radius: 10px; padding: 6px; background: #eef5fb; }
  .cp-row { white-space: nowrap; }
  .cp-cell { display: inline-block; width: 34px; height: 34px; line-height: 34px; text-align: center; font-size: 18px;
    font-weight: bold; color: #2d3436; margin: 2px; border-radius: 6px; background: #fff; cursor: pointer;
    -webkit-user-select: none; -moz-user-select: none; user-select: none; }
  .cp-cell.found { background: #55efc4; color: #1e7e46; }
  .cp-cell.dica { background: #ffd23f; -webkit-animation: pula .5s ease 2; animation: pula .5s ease 2; }
  .cp-cell.sel { background: #ffa502; color: #fff; }
  .cp-words { margin: 12px 0; font-size: 16px; }
  .cp-words span { display: inline-block; margin: 4px 8px; padding: 4px 10px; background: #eef5fb; border-radius: 10px; }
  .cp-words span.hit { background: #55efc4; text-decoration: line-through; color: #1e7e46; }

  /* ARRASTA E SOLTA */
  .ds-pool { margin: 14px 0; }
  .ds-tile { display: inline-block; margin: 6px; padding: 12px 20px; font-size: 24px; font-family: inherit; font-weight: bold;
    color: #fff; background: #6c5ce7; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 0 #4a3cb5; }
  .ds-tile.picked { background: #ffd23f; color: #6a5000; box-shadow: 0 4px 0 #c9a400; }
  .ds-tile.used { visibility: hidden; }
  .ds-slots { margin: 14px 0; }
  .ds-slot { display: inline-block; margin: 6px; padding: 8px; border-radius: 12px; background: #eef5fb;
    border: 3px dashed #2d6fba; text-align: center; min-width: 130px; cursor: pointer; vertical-align: top; }
  .ds-slot svg { width: 64px; height: 64px; }
  .ds-slot .emojibig { font-size: 40px; display: block; }
  .ds-slot .blank { font-size: 22px; font-weight: bold; color: #2d6fba; display: block; margin-top: 4px; min-height: 28px; }
  .ds-slot.filled { border-style: solid; border-color: #27ae60; background: #eafaf1; }
  .ds-slot .blank .filledletter { color: #27ae60; }
  /* RELATÓRIO FINAL */
  .rel-festa { background: -webkit-gradient(linear, left top, left bottom, from(#fff7e0), to(#ffe9c7)); background: linear-gradient(#fff7e0,#ffe9c7); border-radius: 18px; padding: 18px; margin-bottom: 16px; }
  .rel-medalha { font-size: 70px; }
  .rel-faixa { font-size: 19px; font-weight: bold; color: #ee5a24; margin: 4px 0 8px; }
  .rel-estrelas { color: #ffb700; font-size: 24px; letter-spacing: 2px; margin: 6px 0; word-break: break-all; }
  .rel-prof { background: #f3f7fa; border: 2px solid #d3e0ea; border-radius: 16px; padding: 16px; margin-bottom: 16px; text-align: left; }
  .rel-prof-tit { font-size: 19px; font-weight: bold; color: #2d6fba; margin-bottom: 8px; }
  .rel-resumo { font-size: 15px; color: #444; margin-bottom: 12px; }
  .rel-tab { width: 100%; border-collapse: collapse; font-size: 15px; }
  .rel-tab th { background: #2d6fba; color: #fff; padding: 8px; text-align: left; }
  .rel-tab th:not(:first-child), .rel-tab td:not(:first-child) { text-align: center; }
  .rel-tab td { padding: 7px 8px; border-bottom: 1px solid #e0e8ee; color: #333; }
  .rel-tab tr:nth-child(even) td { background: #eaf1f7; }
  .rel-revisar { margin-top: 12px; padding: 10px; border-radius: 10px; background: #fff3e0; border: 2px solid #f0b86b; font-size: 14px; color: #8a5a1e; }
  .rel-revisar.rel-ok { background: #eafaf1; border-color: #8fd9b0; color: #1e7e46; }
  .rel-dica { margin-top: 10px; font-size: 13px; color: #888; font-style: italic; }
  @media print {
    body { background: #fff; }
    .topbar, .footer-note, .nav-btn { display: none; }
    .card { box-shadow: none; }
  }
  .btn-som { background: #ffd23f; border: none; border-radius: 50%; width: 34px; height: 34px; font-size: 17px; cursor: pointer; vertical-align: middle; margin-right: 6px; box-shadow: 0 3px 0 #d4ad00; }
  .btn-som:active { -webkit-transform: translateY(2px); transform: translateY(2px); box-shadow: 0 1px 0 #d4ad00; }
  .btn-falar { background: #5aa9e6; color: #fff; border: none; border-radius: 12px; padding: 8px 16px; font-family: inherit; font-size: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #3d86c0; margin: 4px; }
  .btn-falar:active { -webkit-transform: translateY(2px); transform: translateY(2px); box-shadow: 0 2px 0 #3d86c0; }
  /* animações */
  @-webkit-keyframes pula { 0%{-webkit-transform:scale(1);}30%{-webkit-transform:scale(1.18) rotate(-3deg);}60%{-webkit-transform:scale(0.96);}100%{-webkit-transform:scale(1);} }
  @keyframes pula { 0%{transform:scale(1);}30%{transform:scale(1.18) rotate(-3deg);}60%{transform:scale(0.96);}100%{transform:scale(1);} }
  .anim-pula { -webkit-animation: pula .5s ease; animation: pula .5s ease; }
  @-webkit-keyframes treme { 0%,100%{-webkit-transform:translateX(0);}25%{-webkit-transform:translateX(-7px);}75%{-webkit-transform:translateX(7px);} }
  @keyframes treme { 0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);} }
  .anim-treme { -webkit-animation: treme .4s ease; animation: treme .4s ease; }
  /* confete */
  #confete { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; }
  .confete-peca { position: absolute; width: 10px; height: 14px; border-radius: 2px; }
  @-webkit-keyframes cair { 0%{-webkit-transform:translateY(-20px) rotate(0);opacity:1;}100%{-webkit-transform:translateY(110vh) rotate(540deg);opacity:0.9;} }
  @keyframes cair { 0%{transform:translateY(-20px) rotate(0);opacity:1;}100%{transform:translateY(110vh) rotate(540deg);opacity:0.9;} }
  /* MAPA DE AVENTURA */
  .mapa { position: relative; padding: 10px 0; }
  .mapa-linha { display: block; text-align: center; }
  .mapa-linha.esq { text-align: left; padding-left: 8%; }
  .mapa-linha.dir { text-align: right; padding-right: 8%; }
  .mapa-linha.centro { text-align: center; }
  .mapa-ilha { display: inline-block; width: 150px; border-radius: 18px; padding: 10px 6px; color: #fff; cursor: pointer; box-shadow: 0 5px 0 #00000033; position: relative; -webkit-transition: -webkit-transform .1s; }
  .mapa-ilha:active { -webkit-transform: translateY(3px); transform: translateY(3px); }
  .mapa-ilha.lock { background: #b2bec3 !important; box-shadow: 0 5px 0 #8a9396; cursor: not-allowed; opacity: 0.8; }
  .mapa-ilha.atual { -webkit-animation: pulsa 1.4s ease-in-out infinite; animation: pulsa 1.4s ease-in-out infinite; }
  @-webkit-keyframes pulsa { 0%,100%{box-shadow:0 5px 0 #00000033;}50%{box-shadow:0 5px 0 #00000033, 0 0 0 6px #ffd23f88;} }
  @keyframes pulsa { 0%,100%{box-shadow:0 5px 0 #00000033;}50%{box-shadow:0 5px 0 #00000033, 0 0 0 6px #ffd23f88;} }
  .mapa-num { position: absolute; top: -8px; left: -8px; background: #fff; color: #2d6fba; width: 26px; height: 26px; line-height: 26px; border-radius: 50%; font-size: 14px; font-weight: bold; box-shadow: 0 2px 0 #00000022; }
  .mapa-icone { font-size: 34px; line-height: 1.1; }
  .mapa-nome { font-size: 14px; font-weight: bold; margin-top: 2px; }
  .mapa-conector { width: 4px; height: 22px; background: -webkit-repeating-linear-gradient(#ffd23f, #ffd23f 4px, transparent 4px, transparent 8px); background: repeating-linear-gradient(#ffd23f, #ffd23f 4px, transparent 4px, transparent 8px); margin: 2px auto; }
  .mapa-tesouro { display: inline-block; font-size: 48px; margin-top: 6px; -webkit-animation: pula 1.6s ease infinite; animation: pula 1.6s ease infinite; }
  .mapa-tesouro .mapa-nome { color: #ee5a24; font-size: 16px; }
  /* BOTÕES EXTRAS E ADESIVOS */
  .extras { margin-top: 18px; padding-top: 14px; border-top: 2px dashed #e0e8ee; }
  .ext-btn { display: inline-block; margin: 5px; padding: 11px 18px; font-family: inherit; font-size: 15px; font-weight: bold; color: #fff; background: #6c5ce7; border: none; border-radius: 12px; cursor: pointer; box-shadow: 0 4px 0 #4a3cb5; }
  .ext-btn:active { -webkit-transform: translateY(2px); transform: translateY(2px); box-shadow: 0 2px 0 #4a3cb5; }
  .ext-btn.treino { background: #e67e22; box-shadow: 0 4px 0 #b35f10; }
  .ades-grid { display: -webkit-box; display: flex; flex-wrap: wrap; -webkit-box-pack: center; justify-content: center; margin: 16px 0; }
  .ades { width: 96px; margin: 8px; padding: 12px 6px; border-radius: 16px; position: relative; }
  .ades.on { background: -webkit-gradient(linear, left top, left bottom, from(#fff7e0), to(#ffe9c7)); background: linear-gradient(#fff7e0,#ffe9c7); border: 3px solid #ffd23f; }
  .ades.off { background: #eceff1; border: 3px dashed #b0bec5; opacity: 0.7; }
  .ades-ic { font-size: 36px; }
  .ades-nome { font-size: 12px; font-weight: bold; color: #555; margin-top: 4px; }
  .ades-sel { position: absolute; top: -8px; right: -6px; font-size: 20px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <span class="logo">🔤 Caça-Letras</span>
    <span class="stats"><button id="btnSom" onclick="toggleSom()" class="btn-som">🔊</button> <span class="star">★</span> <b id="score">0</b> pontos</span>
  </div>
  <div class="card" id="card"></div>
  <p class="footer-note">Atividade de Língua Portuguesa &middot; 2º ano do Ensino Fundamental</p>
</div>

<script>
/* ============================================================

   ============================================================ */

SVG.foca = svgWrap(

/* ============================================================
   ÁUDIO — efeitos (Web Audio) + fala (speechSynthesis)
   ============================================================ */
var SOM_LIGADO=true;
var audioCtx=null;
function getCtx(){
  if(audioCtx) return audioCtx;
  try{ var AC=window.AudioContext||window.webkitAudioContext; audioCtx=new AC(); }catch(e){ audioCtx=null; }
  return audioCtx;
}
/* toca uma sequência de notas (freq em Hz, dur em s) */
function tocar(notas){
  if(!SOM_LIGADO) return;
  var ctx=getCtx(); if(!ctx) return;
  var t=ctx.currentTime;
  for(var i=0;i<notas.length;i++){
    var o=ctx.createOscillator(), g=ctx.createGain();
    o.type=notas[i].tipo||'sine';
    o.frequency.value=notas[i].f;
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.25, t+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t+notas[i].d);
    o.connect(g); g.connect(ctx.destination);
    o.start(t); o.stop(t+notas[i].d);
    t+=notas[i].d;
  }
}
function somAcerto(){ tocar([{f:660,d:0.12},{f:880,d:0.16}]); }
function somErro(){ tocar([{f:200,d:0.18,tipo:'square'}]); }
function somFanfarra(){ tocar([{f:523,d:0.14},{f:659,d:0.14},{f:784,d:0.14},{f:1047,d:0.30}]); }
function somClique(){ tocar([{f:440,d:0.06}]); }
/* fala um texto em português, se houver voz disponível */
function falar(texto){
  if(!SOM_LIGADO) return;
  if(!('speechSynthesis' in window)) return;
  try{
    window.speechSynthesis.cancel();
    var u=new SpeechSynthesisUtterance(texto);
    u.lang='pt-BR'; u.rate=0.9; u.pitch=1.1;
    /* tenta achar voz pt */
    var vs=window.speechSynthesis.getVoices();
    for(var i=0;i<vs.length;i++){ if(/pt/i.test(vs[i].lang)){ u.voice=vs[i]; break; } }
    window.speechSynthesis.speak(u);
  }catch(e){}
}
function toggleSom(){
  SOM_LIGADO=!SOM_LIGADO;
  if(!SOM_LIGADO && 'speechSynthesis' in window){ try{window.speechSynthesis.cancel();}catch(e){} }
  var b=document.getElementById('btnSom'); if(b) b.innerHTML=SOM_LIGADO?'🔊':'🔇';
  if(SOM_LIGADO) somClique();
}

   ============================================================ */
function confete(qtd){
  var cores=['#ee5a24','#ffd23f','#27ae60','#2d6fba','#e84393','#6c5ce7'];
  var box=document.getElementById('confete');
  if(!box){ box=document.createElement('div'); box.id='confete'; document.body.appendChild(box); }
  for(var i=0;i<qtd;i++){
    var p=document.createElement('div');
    p.className='confete-peca';
    p.style.left=(Math.random()*100)+'%';
    p.style.background=cores[Math.floor(Math.random()*cores.length)];
    var dur=(1.6+Math.random()*1.4);
    p.style.webkitAnimation='cair '+dur+'s linear forwards';
    p.style.animation='cair '+dur+'s linear forwards';
    p.style.animationDelay=(Math.random()*0.3)+'s';
    box.appendChild(p);
    (function(el){ setTimeout(function(){ if(el&&el.parentNode) el.parentNode.removeChild(el); }, 3200); })(p);
  }
}


function liberada(chave){ var pos=-1; for(var i=0;i<ORDEM.length;i++){if(ORDEM[i]===chave)pos=i;} if(pos===0)return true; return concluidas[ORDEM[pos-1]]===true; }

function embaralhar(arr){ for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;} return arr; }

/* QUIZ */
function palavraAlvo(d){
  /* extrai a palavra do campo explica (primeira palavra antes de — ou ,) */
  var m=d.explica.match(/^([A-Za-zÀ-úÂÃÊÔ]+)/);
  return m? m[1] : '';
}
function mostrarQuiz(){
  respondeu=false;
  var fase=FASES[faseAtual], d=fase.desafios[indiceAtual], total=fase.desafios.length, pct=Math.round((indiceAtual/total)*100);
  var palavraHtml;
  if(d.palavra.indexOf("_")===-1) palavraHtml='<span style="font-size:22px;color:#555">'+d.palavra+'</span>';
  else palavraHtml=d.palavra.replace("_",'<span class="gap">?</span>');
  var alvo=palavraAlvo(d);
  var html="";
  html+='<div class="progress">Desafio '+(indiceAtual+1)+' de '+total+'</div>';
  html+='<div class="bar"><i style="width:'+pct+'%"></i></div>';
  html+='<h2>'+fase.titulo+'</h2><div class="hint">💡 '+fase.dica+'</div>';
  html+='<div class="figura" id="fig">'+figura(d.svg,d.img)+'</div>';
  if(alvo) html+='<div><button class="btn-falar" onclick="falar(\''+alvo+'\')">🔊 Ouvir a palavra</button></div>';
  html+='<div class="word-box">'+palavraHtml+'</div><div class="options" id="opts">';
  for(var i=0;i<d.opcoes.length;i++) html+='<button class="opt" id="opt'+i+'" onclick="responderQuiz(\''+d.opcoes[i]+'\','+i+')">'+d.opcoes[i]+'</button>';
  html+='</div><div class="feedback" id="fb"></div><div id="navarea"></div>';
  card.innerHTML=html;
}
function responderQuiz(letra,idx){
  if(respondeu)return; respondeu=true;
  var fase=FASES[faseAtual], d=fase.desafios[indiceAtual];
  var fb=document.getElementById("fb"), btn=document.getElementById("opt"+idx), pontos=fase.bonus?15:10;
  var fig=document.getElementById("fig");
  if(letra===d.certa){
    registrar(faseAtual,true); addPontos(pontos);
    btn.className="opt correct"; fb.className="feedback ok"; fb.innerHTML="🎉 Muito bem! "+d.explica;
    somAcerto(); confete(40);
    if(fig){ fig.className="figura anim-pula"; }
    var alvo=palavraAlvo(d); if(alvo) setTimeout(function(){ falar(alvo); }, 250);
  }
  else { registrar(faseAtual,false); btn.className="opt wrong"; fb.className="feedback no"; fb.innerHTML="🤔 Quase! O certo é \""+d.certa+"\". "+d.explica;
    somErro(); if(fig){ fig.className="figura anim-treme"; }
    /* guarda no banco de erros para o treino (evita duplicar) */
    var jaTem=false; for(var z=0;z<ERROS.length;z++){ if(ERROS[z].palavra===d.palavra&&ERROS[z].certa===d.certa) jaTem=true; }
    if(!jaTem && !treinoAtivo) ERROS.push(d);
    for(var i=0;i<d.opcoes.length;i++){ if(d.opcoes[i]===d.certa) document.getElementById("opt"+i).className="opt correct"; } }
  var nav=document.getElementById("navarea");
  var ehUltimo=(indiceAtual===fase.desafios.length-1);
  if(ehUltimo && treinoAtivo) nav.innerHTML='<button class="nav-btn" onclick="fimTreino()">Terminar treino 🌟</button>';
  else if(ehUltimo) nav.innerHTML='<button class="nav-btn" onclick="telaFinal()">Ver resultado 🏁</button>';
  else nav.innerHTML='<button class="nav-btn" onclick="proximoQuiz()">Próximo ➜</button>';
}

function desenharMemoria(){
  var fase=FASES.memoria, html="";
  html+='<h2>'+fase.titulo+'</h2><div class="hint">💡 '+fase.dica+'</div>';
  html+='<div class="progress">Pares encontrados: '+memAchados+' de '+fase.pares.length+'</div>';
  html+='<div class="mem-grid">';
  var porLinha=4;
  for(var i=0;i<memCartas.length;i++){
    if(i%porLinha===0) html+='<div class="mem-row">';
    var c=memCartas[i], aberta=(i===memVirada)||(i===memSegunda)||c.done||memHint;
    var cls=c.done?"mem-card mem-done":"mem-card";
    html+='<div class="'+cls+'" onclick="virarCarta('+i+')">';
    if(aberta){
      if(c.tipo==="palavra") html+='<div class="mem-face mem-front"><span class="palavra">'+c.txt+'</span></div>';
      else html+='<div class="mem-face mem-front">'+figura(c.svg,c.emoji)+'</div>';
    } else html+='<div class="mem-face mem-back"></div>';
    html+='</div>';
    if(i%porLinha===porLinha-1) html+='</div>';
  }
  html+='</div>';
  if(memAchados<fase.pares.length) html+='<div class="cp-controls"><button class="cp-mini" onclick="dicaMemoria()">👀 Espiar</button></div>';
  html+='<div class="feedback ok" id="fb">'+(memAchados===fase.pares.length?'🎉 Você achou todos os pares!':'')+'</div>';
  html+='<div id="navarea">';
  if(memAchados===fase.pares.length) html+='<button class="nav-btn" onclick="telaFinal()">Ver resultado 🏁</button>';
  html+='</div>';
  card.innerHTML=html;
}

function dicaMemoria(){
  if(memTrava||memHint) return;
  somClique(); memHint=true; memTrava=true; desenharMemoria();
  setTimeout(function(){ memHint=false; memTrava=false; desenharMemoria(); }, 1200);
}
function virarCarta(i){
  if(memTrava)return;
  var c=memCartas[i];
  if(c.done||i===memVirada)return;
  if(memVirada===-1){ memVirada=i; desenharMemoria(); return; }
  memSegunda=i; desenharMemoria();
  var a=memCartas[memVirada], b=memCartas[memSegunda];
  if(a.id===b.id){ registrar("memoria",true); somAcerto(); confete(25); a.done=true; b.done=true; memAchados++; addPontos(10); memVirada=-1; memSegunda=-1; setTimeout(desenharMemoria,350); }
  else { registrar("memoria",false); somErro(); memTrava=true; setTimeout(function(){ memVirada=-1; memSegunda=-1; memTrava=false; desenharMemoria(); },900); }
}

/* CAÇA-PALAVRAS */
var cpGrid=[], cpTam=8, cpPalavras=[], cpAchadas={}, cpSel=null, cpPos={}, cpDica=null;
function iniciarCaca(){ var fase=FASES.caca; cpTam=8; cpAchadas={}; cpSel=null; cpPos={}; cpDica=null; cpPalavras=fase.palavras.slice(); gerarGradeCaca(); desenharCaca(); }
function gerarGradeCaca(){
  cpGrid=[];
  for(var r=0;r<cpTam;r++){ cpGrid.push([]); for(var c=0;c<cpTam;c++) cpGrid[r].push(""); }
  cpPos={};
  for(var w=0;w<cpPalavras.length;w++){
    var pal=cpPalavras[w], colocada=false, tent=0;
    while(!colocada&&tent<200){
      tent++;
      var horizontal=Math.random()<0.5, r0,c0;
      if(horizontal){ r0=Math.floor(Math.random()*cpTam); c0=Math.floor(Math.random()*(cpTam-pal.length+1)); }
      else { c0=Math.floor(Math.random()*cpTam); r0=Math.floor(Math.random()*(cpTam-pal.length+1)); }
      var ok=true;
      for(var k=0;k<pal.length;k++){ var rr=horizontal?r0:r0+k, cc=horizontal?c0+k:c0, atual=cpGrid[rr][cc]; if(atual!==""&&atual!==pal.charAt(k)){ok=false;break;} }
      if(ok){ var cels=[]; for(var k2=0;k2<pal.length;k2++){ var rr2=horizontal?r0:r0+k2, cc2=horizontal?c0+k2:c0; cpGrid[rr2][cc2]=pal.charAt(k2); cels.push(rr2+"_"+cc2);} cpPos[pal]=cels; colocada=true; }
    }
  }
  var letras="ABCDEFGHIJLMNOPQRSTUV";
  for(var r2=0;r2<cpTam;r2++) for(var c2=0;c2<cpTam;c2++){ if(cpGrid[r2][c2]==="") cpGrid[r2][c2]=letras.charAt(Math.floor(Math.random()*letras.length)); }
}
function desenharCaca(){
  var fase=FASES.caca, achei=0; for(var p in cpAchadas){ if(cpAchadas[p]) achei++; }
  var html="";
  html+='<h2>'+fase.titulo+'</h2><div class="hint">💡 '+fase.dica+'</div>';
  html+='<div class="progress">Encontradas: '+achei+' de '+cpPalavras.length+'</div>';
  html+='<div class="cp-words">';
  for(var i=0;i<cpPalavras.length;i++){ var pal=cpPalavras[i]; html+='<span'+(cpAchadas[pal]?' class="hit"':'')+'>'+pal+'</span>'; }
  html+='</div><div class="cp-grid">';
  for(var r=0;r<cpTam;r++){ html+='<div class="cp-row">'; for(var c=0;c<cpTam;c++){ var key=r+"_"+c, cls="cp-cell"; if(celulaAchada(key))cls+=" found"; if(cpSel&&cpSel===key)cls+=" sel"; else if(cpDica&&cpDica===key)cls+=" dica"; html+='<div class="'+cls+'" onclick="clicarCelula('+r+','+c+')">'+cpGrid[r][c]+'</div>'; } html+='</div>'; }
  html+='</div>';
  if(achei<cpPalavras.length) html+='<div class="cp-controls"><button class="cp-mini" onclick="dicaCaca()">💡 Dica</button></div>';
  html+='<div class="feedback" id="fb"></div><div id="navarea">';
  if(achei===cpPalavras.length) html+='<button class="nav-btn" onclick="telaFinal()">Ver resultado 🏁</button>';
  html+='</div>';
  card.innerHTML=html;
  if(achei===cpPalavras.length){ var fb=document.getElementById("fb"); fb.className="feedback ok"; fb.innerHTML="🎉 Você achou todas as palavras!"; }
}
function celulaAchada(key){ for(var p in cpAchadas){ if(cpAchadas[p]){ var arr=cpPos[p]; for(var i=0;i<arr.length;i++){ if(arr[i]===key) return true; } } } return false; }
function clicarCelula(r,c){
  var key=r+"_"+c;
  if(cpSel===null){ cpSel=key; desenharCaca(); return; }
  if(cpSel===key){ cpSel=null; desenharCaca(); return; }
  var p1=cpSel.split("_"), r1=parseInt(p1[0],10), c1=parseInt(p1[1],10);
  var caminho=linhaReta(r1,c1,r,c); cpSel=null;
  if(!caminho){ desenharCaca(); return; }
  var s1=""; for(var i=0;i<caminho.length;i++){ var pp=caminho[i].split("_"); s1+=cpGrid[parseInt(pp[0],10)][parseInt(pp[1],10)]; }
  var s2=s1.split("").reverse().join(""), acertou=null;
  for(var w=0;w<cpPalavras.length;w++){ var pal=cpPalavras[w]; if(!cpAchadas[pal]&&(pal===s1||pal===s2)) acertou=pal; }
  if(acertou){ registrar("caca",true); somAcerto(); confete(25); cpAchadas[acertou]=true; addPontos(10); }
  else { registrar("caca",false); somErro(); }
  desenharCaca();
  if(!acertou){ var f=document.getElementById("fb"); if(f){ f.className="feedback no"; f.innerHTML="🤔 Não foi dessa vez, tente outra!"; } }
}

function dicaCaca(){
  somClique();
  var alvo=null;
  for(var i=0;i<cpPalavras.length;i++){ if(!cpAchadas[cpPalavras[i]]){ alvo=cpPalavras[i]; break; } }
  if(!alvo) return;
  cpDica=cpPos[alvo][0]; /* primeira celula da palavra */
  desenharCaca();
  setTimeout(function(){ cpDica=null; desenharCaca(); }, 1400);
}
function linhaReta(r1,c1,r2,c2){
  var cells=[];
  if(r1===r2){ var a=Math.min(c1,c2),b=Math.max(c1,c2); for(var c=a;c<=b;c++) cells.push(r1+"_"+c); return cells; }
  if(c1===c2){ var a2=Math.min(r1,r2),b2=Math.max(r1,r2); for(var r=a2;r<=b2;r++) cells.push(r+"_"+c1); return cells; }
  return null;
}

/* ARRASTA E SOLTA */
var dsItens=[], dsLetras=[], dsPick=-1, dsResolvidos=0;
function iniciarArrasta(){
  var fase=FASES.arrasta; dsItens=[]; 
  for(var i=0;i<fase.itens.length;i++){ var it=fase.itens[i]; dsItens.push({ svg:it.svg, emoji:it.emoji, base:it.base, certa:it.certa, preenchido:null }); }
  dsResolvidos=0; dsPick=-1; dsLetras=[];
  for(var j=0;j<dsItens.length;j++) dsLetras.push({ txt:dsItens[j].certa, used:false });
  embaralhar(dsLetras); desenharArrasta();
}
function desenharArrasta(){
  var fase=FASES.arrasta, html="";
  html+='<h2>'+fase.titulo+'</h2><div class="hint">💡 '+fase.dica+'</div>';
  html+='<div class="progress">Completadas: '+dsResolvidos+' de '+dsItens.length+'</div>';
  html+='<div class="ds-pool">';
  for(var i=0;i<dsLetras.length;i++){ var l=dsLetras[i], cls="ds-tile"; if(l.used)cls+=" used"; else if(dsPick===i)cls+=" picked"; html+='<button class="'+cls+'" onclick="pegarLetra('+i+')">'+l.txt+'</button>'; }
  html+='</div><div class="ds-slots">';
  for(var j=0;j<dsItens.length;j++){
    var it=dsItens[j], filled=it.preenchido!==null, cls2=filled?"ds-slot filled":"ds-slot";
    var letraMostrada=filled?'<span class="filledletter">'+it.preenchido+'</span>':'_', resto=it.base.substring(1);
    html+='<div class="'+cls2+'" onclick="soltarLetra('+j+')">'+figura(it.svg,it.emoji)+'<span class="blank">'+letraMostrada+resto+'</span></div>';
  }
  html+='</div><div class="feedback" id="fb"></div><div id="navarea">';
  if(dsResolvidos===dsItens.length) html+='<button class="nav-btn" onclick="telaFinal()">Ver resultado 🏁</button>';
  html+='</div>';
  card.innerHTML=html;
  if(dsResolvidos===dsItens.length){ var fb=document.getElementById("fb"); fb.className="feedback ok"; fb.innerHTML="🎉 Você completou todas as palavras!"; }
}
function pegarLetra(i){ if(dsLetras[i].used)return; dsPick=(dsPick===i)?-1:i; desenharArrasta(); }
function soltarLetra(j){
  var it=dsItens[j];
  if(it.preenchido!==null)return;
  if(dsPick===-1){ var fb=document.getElementById("fb"); if(fb){fb.className="feedback no"; fb.innerHTML="👆 Primeiro toque numa letra!";} return; }
  var letra=dsLetras[dsPick].txt;
  if(letra===it.certa){ registrar("arrasta",true); somAcerto(); confete(20); var alvoA=it.base.replace("_",it.certa); setTimeout(function(){falar(alvoA);},250); it.preenchido=letra; dsLetras[dsPick].used=true; dsPick=-1; dsResolvidos++; addPontos(10); desenharArrasta(); }
  else { registrar("arrasta",false); somErro(); dsPick=-1; desenharArrasta(); var f=document.getElementById("fb"); if(f){ f.className="feedback no"; f.innerHTML="🤔 Essa letra não é dessa palavra. Tente outra!"; } }
}

/* ============================================================
   RELATÓRIO FINAL — festivo (criança) + painel do professor
   ============================================================ */
function telaRelatorio(){
  /* agrega numeros */
  var totalAcertos=0, totalErros=0, fasesFeitas=0;
  for(var i=0;i<ORDEM.length;i++){
    var s=STATS[ORDEM[i]];
    if(s){ totalAcertos+=s.acertos; totalErros+=s.erros; if(s.feita) fasesFeitas++; }
  }
  var totalTent=totalAcertos+totalErros;
  var aproveit = totalTent>0 ? Math.round((totalAcertos/totalTent)*100) : 0;
  var estrelas = Math.round(score/10);

  /* medalha conforme aproveitamento */
  var medalha, faixa;
  if(aproveit>=90){ medalha="🥇"; faixa="Ouro — Mestre das Letras!"; }
  else if(aproveit>=70){ medalha="🥈"; faixa="Prata — Muito bem!"; }
  else { medalha="🥉"; faixa="Bronze — Bom trabalho!"; }

  var html="";
  /* ----- parte festiva (criança) ----- */
  html+='<div class="rel-festa">';
  html+='<div class="rel-medalha">'+medalha+'</div>';
  html+='<h1>Aventura concluída!</h1>';
  if(ALUNO) html+='<div style="font-size:20px;font-weight:bold;color:#2d6fba;margin-bottom:6px">Aluno(a): '+ALUNO+'</div>';
  html+='<div class="rel-faixa">'+faixa+'</div>';
  html+='<div class="rel-estrelas">';
  var cheias = Math.min(estrelas,15);
  for(var e=0;e<cheias;e++) html+='★';
  html+='</div>';
  html+='<div class="big-score">'+score+' pontos &middot; '+totalAcertos+' acertos</div>';
  html+='<p class="lead">Você completou todas as 9 atividades e aprendeu a escrever com V, F, P, B, T, D e o som do NH. Parabéns, explorador das palavras!</p>';
  html+='</div>';

  /* ----- painel do professor ----- */
  html+='<div class="rel-prof">';
  html+='<div class="rel-prof-tit">📋 Relatório para o professor</div>';
  html+='<div class="rel-resumo">Atividades concluídas: <b>'+fasesFeitas+' de 9</b> &middot; Aproveitamento geral: <b>'+aproveit+'%</b> &middot; Tentativas: <b>'+totalTent+'</b></div>';
  html+='<table class="rel-tab"><tr><th>Atividade</th><th>Acertos</th><th>Erros</th><th>%</th></tr>';
  var revisar=[];
  for(var j=0;j<ORDEM.length;j++){
    var ch=ORDEM[j], f=FASES[ch], s=STATS[ch];
    var ac = s? s.acertos:0, er = s? s.erros:0, tt=ac+er;
    var pc = tt>0? Math.round((ac/tt)*100) : 0;
    var nome = f.titulo.replace(/^[★🏅]\s*/,'').replace(/^Fase \d+ — /,'');
    var cor = tt===0? '#aaa' : (pc>=70?'#27ae60':(pc>=50?'#f0932b':'#c0392b'));
    html+='<tr><td>'+nome+'</td><td>'+ac+'</td><td>'+er+'</td>'+
          '<td style="color:'+cor+';font-weight:bold">'+(tt>0?pc+'%':'—')+'</td></tr>';
    if(tt>0 && pc<70) revisar.push(nome);
  }
  html+='</table>';
  if(revisar.length){
    html+='<div class="rel-revisar"><b>Sugestão de revisão:</b> '+revisar.join(', ')+'. Vale retomar essas letras/sons com mais exemplos.</div>';
  } else {
    html+='<div class="rel-revisar rel-ok"><b>Ótimo desempenho!</b> A criança dominou bem todos os sons trabalhados.</div>';
  }
  html+='<div class="rel-dica">Dica: use o botão do navegador (Ctrl+P) para imprimir ou salvar este relatório em PDF.</div>';
  html+='</div>';

  html+='<button class="nav-btn ghost" onclick="telaMenu()">🏠 Voltar ao início</button>';
  card.innerHTML=html;
}

    html+='<input id="inpNome" type="text" maxlength="20" placeholder="Digite seu nome" style="font-family:inherit;font-size:18px;padding:12px 16px;border:3px solid #ffd23f;border-radius:14px;text-align:center;width:80%;max-width:280px;"/>';
    html+='<br><button class="nav-btn" onclick="comecarComNome()">Começar a aventura! 🚀</button>';
  }
  card.innerHTML=html;
}
function comecarComNome(){
  var inp=document.getElementById("inpNome");
  ALUNO=(inp&&inp.value? inp.value.replace(/[<>]/g,'').trim() : "") || "Explorador(a)";
  somClique(); salvar(); telaMenu();
}
function reiniciarTudo(){
  if(window.confirm && !window.confirm("Apagar o progresso e começar do zero?")) return;
  apagarProgresso(); telaInicio();
}

telaInicio();
</script>
